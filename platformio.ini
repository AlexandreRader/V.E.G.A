; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



[env:esp32-s3-devkitc-1]
platform = espressif32 @ ^6.5.0
board = esp32-s3-devkitc-1
framework = arduino
build_flags = 
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D BUFFER_LENGTH=32
	-I station_sol
	
build_src_filter = +<*> +<main.cpp> -<main_wokwi.cpp>


lib_deps =
	
	https://github.com/teemuatlut/TMCStepper ;Drivers steppers
	https://github.com/SeeedDocument/Grove-16-Channel_PWM_Driver-PCA9685.git ; Driver PCA9685 servos
	https://github.com/stm32duino/VL53L3CX.git ;Capteurs TOFs
	https://github.com/nRF24/RF24.git ; NRF24L01 RF24 library
	https://github.com/adafruit/Adafruit-PWM-Servo-Driver-Library.git ; PWM servo driver
	https://github.com/tomstewart89/BasicLinearAlgebra.git ; Matrix math pour EKF
	https://github.com/nRF24/RF24.git
	

; Configuration pour simulation Wokwi
[env:wokwi]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_flags =
    -D WOKWI_SIMULATION=1
    -D ARDUINO_USB_CDC_ON_BOOT=1    ; IMPORTANT : Désactive l'USB lourd
    -D ARDUINO_USB_MODE=1           ; Utilise l'UART0 classique
    -I station_sol
lib_deps =
    https://github.com/tomstewart89/BasicLinearAlgebra.git
	madhephaestus/ESP32Servo@^1.1.1
build_src_filter = +<*> -<main.cpp> +<main_wokwi.cpp>